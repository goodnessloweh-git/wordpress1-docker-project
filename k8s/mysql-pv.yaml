apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/mysql-data
  persistentVolumeReclaimPolicy: Retain

# Note: hostPath PVs are for local testing only. Ensure the host path exists: `mkdir -p /tmp/mysql-data`.
