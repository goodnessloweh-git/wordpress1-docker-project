apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: wordpress-vpa
  namespace: wordpress
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: wordpress
  updatePolicy:
    updateMode: "Auto"

# Note: VPA requires the Vertical Pod Autoscaler components to be installed in the cluster.
