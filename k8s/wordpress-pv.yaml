apiVersion: v1
kind: PersistentVolume
metadata:
  name: wordpress-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /tmp/wordpress-data
  persistentVolumeReclaimPolicy: Retain

# Note: hostPath PVs are for local testing only. Ensure the host path exists: `mkdir -p /tmp/wordpress-data`.
