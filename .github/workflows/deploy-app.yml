name: CI/CD - App Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPOSITORY }}:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPOSITORY }}:latest
          context: .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.27.0'
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml
      - name: Create image pull secret
        run: |
          kubectl -n wordpress create secret docker-registry regcred \
            --docker-server='${{ secrets.DOCKER_REGISTRY }}' \
            --docker-username='${{ secrets.DOCKER_USERNAME }}' \
            --docker-password='${{ secrets.DOCKER_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/mysql-secret.yaml -f k8s/wordpress-configmap.yaml
          kubectl apply -f k8s/mysql-deployment.yaml -f k8s/wordpress-deployment.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml || true
      - name: Update deployment image
        env:
          IMAGE: ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPOSITORY }}:${{ github.sha }}
        run: |
          kubectl -n wordpress set image deployment/wordpress wordpress=$IMAGE || kubectl -n wordpress rollout restart deployment/wordpress
      - name: Wait for rollout
        run: |
          kubectl -n wordpress wait --for=condition=available deployment/mysql --timeout=600s
          kubectl -n wordpress wait --for=condition=available deployment/wordpress --timeout=600s
      - name: Show access details
        run: |
          kubectl -n wordpress get pods,svc,hpa
          kubectl -n wordpress get svc wordpress
