name: CI/CD - App Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: app-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate required secrets
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_REPOSITORY: ${{ secrets.DOCKER_REPOSITORY }}
        run: |
          missing=0
          for key in DOCKER_REGISTRY DOCKER_USERNAME DOCKER_PASSWORD DOCKER_REPOSITORY; do
            if [[ -z "${!key}" ]]; then
              echo "[error] Missing required secret: $key"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPOSITORY }}:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPOSITORY }}:latest
          context: .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate required secrets
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          missing=0
          for key in KUBE_CONFIG_DATA MYSQL_ROOT_PASSWORD MYSQL_PASSWORD; do
            if [[ -z "${!key}" ]]; then
              echo "[error] Missing required secret: $key"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.31.0'
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.4'
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml
      - name: Create MySQL secret
        env:
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
        run: |
          MYSQL_DATABASE_VALUE="${MYSQL_DATABASE:-wordpress}"
          MYSQL_USER_VALUE="${MYSQL_USER:-wpuser}"

          kubectl -n wordpress create secret generic mysql-secret \
            --from-literal=mysql-root-password='${{ secrets.MYSQL_ROOT_PASSWORD }}' \
            --from-literal=mysql-password='${{ secrets.MYSQL_PASSWORD }}' \
            --from-literal=mysql-database="${MYSQL_DATABASE_VALUE}" \
            --from-literal=mysql-user="${MYSQL_USER_VALUE}" \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Create image pull secret
        if: ${{ secrets.DOCKER_REGISTRY != '' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        run: |
          kubectl -n wordpress create secret docker-registry regcred \
            --docker-server='${{ secrets.DOCKER_REGISTRY }}' \
            --docker-username='${{ secrets.DOCKER_USERNAME }}' \
            --docker-password='${{ secrets.DOCKER_PASSWORD }}' \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy with Helm
        env:
          INGRESS_HOST: ${{ secrets.INGRESS_HOST }}
          INGRESS_TLS_SECRET_NAME: ${{ secrets.INGRESS_TLS_SECRET_NAME }}
          INGRESS_MANAGED_CERT_NAME: ${{ secrets.INGRESS_MANAGED_CERT_NAME }}
        run: |
          HELM_ARGS=(
            --namespace wordpress
            --set image.repository='${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_REPOSITORY }}'
            --set image.tag='${{ github.sha }}'
          )

          if ! kubectl get sc -o jsonpath='{range .items[*]}{.metadata.annotations.storageclass\.kubernetes\.io/is-default-class}{"\n"}{end}' | grep -q '^true$'; then
            echo "[info] No default StorageClass found; deploying with ephemeral storage"
            HELM_ARGS+=(
              --set persistence.mysql.enabled=false
              --set persistence.wordpress.enabled=false
            )
          fi

          if [[ -n "${INGRESS_HOST}" ]]; then
            HELM_ARGS+=(--set ingress.enabled=true --set "ingress.host=${INGRESS_HOST}")

            if [[ -n "${INGRESS_MANAGED_CERT_NAME}" ]]; then
              HELM_ARGS+=(
                --set ingress.className=gce
                --set ingress.managedCertificate.enabled=true
                --set "ingress.managedCertificate.name=${INGRESS_MANAGED_CERT_NAME}"
              )
            fi

            if [[ -n "${INGRESS_TLS_SECRET_NAME}" ]]; then
              HELM_ARGS+=(--set ingress.tls.enabled=true --set "ingress.tls.secretName=${INGRESS_TLS_SECRET_NAME}")
            fi
          fi

          helm upgrade --install wordpress ./charts/wordpress \
            "${HELM_ARGS[@]}"
      - name: Wait for rollout
        run: |
          kubectl -n wordpress wait --for=condition=available deployment/mysql --timeout=600s
          kubectl -n wordpress wait --for=condition=available deployment/wordpress --timeout=600s
      - name: Show access details
        run: |
          kubectl -n wordpress get pods,svc,hpa
          kubectl -n wordpress get svc wordpress
